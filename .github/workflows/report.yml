name: Generate Job Market Report

on:
  workflow_run:
    workflows: ["Scrape Afriworket Jobs"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest parquet from scraper repo
        run: |
          mkdir -p data
          curl -L "https://github.com/Imr-u/jobs.et/raw/main/data/jobs.parquet" -o data/jobs_raw.parquet

      - name: Clean data
        run: python pipeline/clean.py

      - name: Normalize titles and experience levels
        run: python pipeline/normalize.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Analyze
        run: python pipeline/analyze.py

      - name: Generate HTML report
        run: python pipeline/generate_report.py

      - name: Commit cache and analysis back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/title_cache.json data/analysis.json docs/index.html
          git diff --staged --quiet || git commit -m "chore: auto-update analysis [skip ci]"
          git push

      - name: Deploy index.html to gh-pages
        run: |
          mkdir -p /tmp/deploy
          cp docs/index.html /tmp/deploy/index.html
          cd /tmp/deploy
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add .
          git commit -m "deploy: update job market report"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Imr-u/Job_market.git HEAD:gh-pages
